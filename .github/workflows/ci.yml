name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "1 1 * * 1"
  merge_group:

permissions:
  contents: write
  deployments: write

jobs:
  bench-go:
    defaults:
      run:
        working-directory: go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: |
            go/go.sum

      - name: Bench
        run: |
          go test -bench=. -benchmem ./... | tee benchmark_result.txt

      - name: Continuous Benchmark
        uses: benchmark-action/github-action-benchmark@v1.22.1
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          name: Go Library Benchmark
          tool: "go"
          output-file-path: go/benchmark_result.txt
          github-token: ${{ secrets.CI_TOKEN }}
          gh-repository: "github.com/ringsaturn/tz-benchmark"
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: "gh-pages"
          benchmark-data-dir-path: "docs/"
          alert-comment-cc-users: "@ringsaturn"

      - name: Report
        run: |
          set +e
          cp benchmark_result.txt benchmark_result_go.txt

      - run: ls -lah

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark_result_go
          path: go/benchmark_result_go.txt
          if-no-files-found: error

  bench-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    env:
      COLUMNS: 120

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync

      - name: Bench Python
        run: |
          uv run pytest tz_test.py --benchmark-json output.json | tee benchmark_result.txt

      - name: Continuous Benchmark
        uses: benchmark-action/github-action-benchmark@v1.22.1
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          name: Python Library Benchmark
          tool: "pytest"
          output-file-path: python/output.json
          github-token: ${{ secrets.CI_TOKEN }}
          gh-repository: "github.com/ringsaturn/tz-benchmark"
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: "gh-pages"
          benchmark-data-dir-path: "docs/"
          alert-comment-cc-users: "@ringsaturn"

      - name: Report
        run: |
          set +e
          cp benchmark_result.txt benchmark_result_python.txt

      - run: ls -lah

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark_result_python
          path: python/benchmark_result_python.txt
          if-no-files-found: error

  bench-rust:
    defaults:
      run:
        working-directory: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run benchmark
        run: cargo bench | tee benchmark_result.txt

      - name: Continuous Benchmark
        uses: benchmark-action/github-action-benchmark@v1.22.1
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          name: Rust Library Benchmark
          tool: "cargo"
          output-file-path: rust/benchmark_result.txt
          github-token: ${{ secrets.CI_TOKEN }}
          gh-repository: "github.com/ringsaturn/tz-benchmark"
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: "gh-pages"
          benchmark-data-dir-path: "docs/"
          alert-comment-cc-users: "@ringsaturn"

      - name: Report
        run: |
          set +e
          cp benchmark_result.txt benchmark_result_rust.txt

      - run: ls -lah

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark_result_rust
          path: rust/benchmark_result_rust.txt
          if-no-files-found: error

  summary:
    needs: [bench-go, bench-python, bench-rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download a Build Artifact
        uses: actions/download-artifact@v8
        with:
          pattern: "benchmark_result_*"
          path: ci-summary/raw
          merge-multiple: true

      - name: Generate benchmark summary
        run: |
          set -euo pipefail
          snapshot_dir="ci-summary/snapshot/${{ github.run_id }}-${{ github.sha }}"
          mkdir -p "$snapshot_dir"
          cp ci-summary/raw/benchmark_result_*.txt "$snapshot_dir"/
          python3 scripts/generate_snapshot_readmes.py --snapshot-root ci-summary/snapshot
          cp "$snapshot_dir/README.md" ci-summary/benchmark-summary.md
          cat ci-summary/benchmark-summary.md > "$GITHUB_STEP_SUMMARY"

      - name: Comment benchmark summary on commit
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- tz-benchmark-summary -->';
            const summary = fs.readFileSync('ci-summary/benchmark-summary.md', 'utf8');
            const body = `${marker}\n${summary}`;
            const { owner, repo } = context.repo;
            const commit_sha = context.sha;

            const comments = await github.paginate(
              github.rest.repos.listCommentsForCommit,
              { owner, repo, commit_sha, per_page: 100 },
            );
            const existing = comments.find((comment) =>
              comment.body?.includes(marker) && comment.user?.type === 'Bot'
            );

            if (existing) {
              await github.rest.repos.updateCommitComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.repos.createCommitComment({
                owner,
                repo,
                commit_sha,
                body,
              });
            }
